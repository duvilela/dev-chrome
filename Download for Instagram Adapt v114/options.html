<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>ExDU: Configurações</title>
    <link rel="stylesheet" href="/css/options.css">
    <style>
        .options-brand {
            font-family: "Quantico", sans-serif;
            text-align: center;
        }
        .options-title-main {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #00D2FF 0%, #0052D4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 10px 0 5px 0;
        }
        .options-version {
            font-size: 13px;
            color: #666;
            margin-bottom: 15px;
        }
        .options-status {
            font-size: 14px;
            font-weight: 700;
            color: #0052D4;
            margin: 10px 0;
        }
        .options-credits {
            font-size: 12px;
            color: #888;
            margin-top: 15px;
            border-top: 1px solid #ddd;
            padding-top: 10px;
        }
    </style>
</head>
<body>
    <div class="row-holder">
        <div class="options-brand">
            <div class="options-title-main">ExDU Downloader</div>
            <div class="options-version">Versão 1.1.4</div>
            <div class="options-status">✔ Ativado e pronto para uso</div>
            <div class="options-credits">Desenvolvido por @duhvilela</div>
        </div>
    </div>
    <script src="/js/options.js"></script>
</body>
</html>
